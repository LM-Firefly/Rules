name: Push to subconverter
on:
  push:
  workflow_dispatch:
concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  # 自动取消其他运行中的workflow
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GIT_TOKEN: ${{secrets.REPO_TOKEN}}
    steps:
      - uses: actions/checkout@v6
      - name: Push update to subconverter
        if: ${{ github.ref == 'refs/heads/master' }}
        uses: actions/github-script@v8
        with:
          github-token: ${{env.GIT_TOKEN}}
          script: |
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: 'subconverter',
                workflow_id: 'submodule.yml',
                ref: 'simpleweb',
              });
              core.info(`Triggered ${context.repo.owner}/subconverter submodule.yml on simpleweb.`);
            } catch (error) {
              if (error && (error.status === 401 || error.status === 403)) {
                core.warning(`Skipped downstream dispatch due to authentication or permission issue: ${error?.message || 'Unknown error'}`);
              } else {
                throw error;
              }
            }
