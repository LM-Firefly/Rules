replace = "澳大利亚 $6"

[[node_pref.rename_node]]
match = "^((?i:\\bC[H]?N\\b)|((「|\u300c)(🇨🇳)(」|\u300d)))(.*)"
replace = "中国 $6"

[[node_pref.rename_node]]
match = "^(\\bRO\\d*\\b)(.*)"
replace = "罗马尼亚 $2"

[[node_pref.rename_node]]
match = "^(\\bBR\\d*\\b)(.*)"
replace = "巴西 $2"

[[node_pref.rename_node]]
match = "^((?i:\\bES[P]?\\d*\\b)|((「|\u300c)(🇪🇸)(」|\u300d)))(.*)"
replace = "西班牙 $6"

[[node_pref.rename_node]]
match = "移动"
replace = "CM"

[[node_pref.rename_node]]
match = "电信"
replace = "CT"

[[node_pref.rename_node]]
match = "联通"
replace = "CU"

[[node_pref.rename_node]]
match = "深港专线"
replace = "深港"

[[node_pref.rename_node]]
match = "(转)"
replace = "▷"

[[node_pref.rename_node]]
match = "((NF)|(NF\\*)|(BBC)|(abema)|(动画疯)|(Netflix)|(動畫瘋)|(Hulu)|(\\[注册Netflix\\])|(HBO)|(TVB)|(D\\+)|(Disney)|(Yp)|(Youtube)|(Y2B P)|(AI)|(解锁流媒体)|(原生IP)|(原生)|( NF )|( D\\+ )|(流媒体)|(-M)|(解锁))"
replace = "[M]"

[[node_pref.rename_node]]
match = "\\[M\\].*\\[M\\]"
replace = "[M]"

[[node_pref.rename_node]]
match = "(\\w+|[\u4e00-\u9fa5]+)\\s\\1"
replace = "$1 "

[[node_pref.rename_node]]
match = "\\[CM\\]|\\[CU\\]|\\[BT\\/PT专用\\]|\\[荐\\]|\\[Beta\\]|\\[移动\\]|\\[联通\\]|\\[综合\\]|\\[备用\\]|\\[阿里云\\]|\\[测试\\]|\\[v6\\]|高速|100m限速|CDN加速|Game|PPCW|Sakura"
replace = ""

# [[node_pref.rename_node]]
# match = "(?!<=[\\]|\\)])$"
# replace = "[x1]"

[[node_pref.rename_node]]
match = "(x|X)(\\d*.?\\d*\\d)"
replace = "[x$2]"

[[node_pref.rename_node]]
match = "(.*)(\\[)(倍率:)(.*\\d)(\\])"
replace = "$1[x$4]"

[[node_pref.rename_node]]
match = "(\\[x.*\\d\\])(.*)"
replace = "$2$1"

[[node_pref.rename_node]]
match = "(.*)( )(.*\\d)(倍率)"
replace = "$1[x$3]"

[[node_pref.rename_node]]
match = "(.*)(\\|)(x.*\\d)(倍率)"
replace = "$1[$3]"

[[node_pref.rename_node]]
match = "(.*)( )(x.*\\d)"
replace = "$1[$3]"

[[node_pref.rename_node]]
match = "\\[\\]"
replace = ""

[[node_pref.rename_node]]
match = "\\(?((x|X)?(\\d+)(\\.?\\d+)?)((\\s?倍率?)|(x|X))\\)?"
replace = "[x$1]"


