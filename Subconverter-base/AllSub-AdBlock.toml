version = 1
[custom]
enable_rule_generator = true
overwrite_original_rules = true

clash_rule_base = "https://raw.githubusercontent.com/LM-Firefly/Rules/master/Subconverter-base/all-base.tpl"
surge_rule_base = "https://raw.githubusercontent.com/LM-Firefly/Rules/master/Subconverter-base/all-base.tpl"
surfboard_rule_base = "https://raw.githubusercontent.com/LM-Firefly/Rules/master/Subconverter-base/all-base.tpl"
mellow_rule_base = "https://raw.githubusercontent.com/LM-Firefly/Rules/master/Subconverter-base/all-base.tpl"
quan_rule_base = "https://raw.githubusercontent.com/LM-Firefly/Rules/master/Subconverter-base/all-base.tpl"
quanx_rule_base = "https://raw.githubusercontent.com/LM-Firefly/Rules/master/Subconverter-base/all-base.tpl"
loon_rule_base = "https://raw.githubusercontent.com/LM-Firefly/Rules/master/Subconverter-base/all-base.tpl"
sssub_rule_base = "https://raw.githubusercontent.com/LM-Firefly/Rules/master/Subconverter-base/all-base.tpl"
singbox_rule_base = "https://raw.githubusercontent.com/LM-Firefly/Rules/master/Subconverter-base/all-base.tpl"

exclude_remarks = [
    "((到期)|(剩余流量)|(时间)|(官网)|(产品)|(先购买套餐)|(流量消耗)|(更新订阅)|(套餐到期)|(.*流量.*剩.*天)|(■等级警报■)|(\\(限速\\))|(\\[限速\\])|(\\[游戏\\])|(\\[游戏专用\\])|(\\[将下线\\])|(.*耗尽.*)|(近期下线)|(游戏专线)|(维护)|(测试节点)|(防失联地址)|(官方地址)|(官方网站)|(群组))",
]


[node_pref]
udp_flag = true
clash_proxies_style = "block"
clash_proxy_groups_style = "block"

[[node_pref.rename_node]]
match = "(解锁|)(\\|)(x.*)(\\|V2ray)"
replace = "$[$3]"

[[node_pref.rename_node]]
match = "(..|...)(\\d\\d\\d\\d|\\d\\d\\d)(\\|)(Azure|HKT|CN2GIA)"
replace = "$1$4$2"

[[node_pref.rename_node]]
match = "((^CordCloud - )|(关注TG@txwl666)|(一元机场:ssrsub.de))"
replace = ""

[[node_pref.rename_node]]
match = "(标准)|(标准线路)|(线路)|(中转)|(直连)|(80端口)|(V\\d-)|(IEPL专线 )|(IPV6)|((海外\\|新疆专用))|((\u6d77\u5916\\|\u65b0\u7586\u4e13\u7528))"
replace = ""

[[node_pref.rename_node]]
match = "(.*)( )(.*\\d)( \\| )(.*)"
replace = "$1$3$5"

[[node_pref.rename_node]]
match = "(.*)(\\b\\d.*\\d\\b)(静态解锁|动态解锁|原生解锁|解锁|动态原生|静态原生|原生)"
replace = "$1$2[M]"

[[node_pref.rename_node]]
match = "(.*)(\\d.*\\d)(\\|[\\w].*\\d)"
replace = "$1$2"

[[node_pref.rename_node]]
match = "(.*)(NO)(.?\\d?\\d?\\d)$"
replace = "$1 $3"

# [[node_pref.rename_node]]
# match = "(「|\u300c)(\\p{RI}\\p{RI})(」|\u300d)"
# replace = "$2 "

[[node_pref.rename_node]]
match = "((CN\\d•)|^)(⓪|❶|❷|❸|❻)(TJ\\.|gR\\.|V2\\.|H2\\.|SS\\.)"
replace = ""

[[node_pref.rename_node]]
match = "(商宽)|(\\d组)|(--)|(◆)"
replace = ""

[[node_pref.rename_node]]
match = "^(.*)(?i:\\bHK[G]?\\d*\\b|Hong.*?Kong|\\bHKT\\d*\\b|\\bHKBN\\d*\\b|\\bHGC\\d*\\b|\\bWTT\\d*\\b|\\bCMI\\d*\\b|\\bHK\\d*\\b)([\u4e00-\u9fa5].*|\\d*)"
replace = "香港 $2"

[[node_pref.rename_node]]
match = "^((「|\u300c)(🇭🇰)(」|\u300d))(.*)"
replace = "香港 $5"

[[node_pref.rename_node]]
match = "^((?i:\\bUS[A]?\\d*\\b)|((「|\u300c)(🇺🇸)(」|\u300d)))(.*)"
replace = "美国 $6"

[[node_pref.rename_node]]
match = "^((?i:\\bJP[N]?\\d*\\b)|((「|\u300c)(🇯🇵)(」|\u300d)))(.*)"
replace = "日本 $6"

