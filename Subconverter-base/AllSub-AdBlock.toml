# [[node_pref.rename_node]]
# match = "(?!<=[\\]|\\)])$"
# replace = "[x1]"

[[node_pref.rename_node]]
match = "(x|X)(\\d*.?\\d*\\d)"
replace = "[x$2]"

[[node_pref.rename_node]]
match = "(.*)(\\[)(倍率:)(.*\\d)(\\])"
replace = "$1[x$4]"

[[node_pref.rename_node]]
match = "(\\[x.*\\d\\])(.*)"
replace = "$2$1"

[[node_pref.rename_node]]
match = "(.*)( )(.*\\d)(倍率)"
replace = "$1[x$3]"

[[node_pref.rename_node]]
match = "(.*)(\\|)(x.*\\d)(倍率)"
replace = "$1[$3]"

[[node_pref.rename_node]]
match = "(.*)( )(x.*\\d)"
replace = "$1[$3]"

[[node_pref.rename_node]]
match = "\\[\\]"
replace = ""

[[node_pref.rename_node]]
match = "\\(?((x|X)?(\\d+)(\\.?\\d+)?)((\\s?倍率?)|(x|X))\\)?"
replace = "[x$1]"


